<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Glowsn</title>
    <meta name="description" content="Create your Glowsn account and join our community of fashion enthusiasts.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-bag"></i> Glowsn
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="auth-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="auth-card" id="signupCard">
                        <div class="auth-card-header">
                            <div class="auth-icon">
                                <i class="fas fa-user-plus"></i>
                            </div>
                            <h2>Create Account</h2>
                            <p>Join the Glowsn community today</p>
                        </div>

                        <!-- Alert container for messages -->
                        <div id="signupAlert" class="auth-alert" style="display:none;"></div>

                        <form id="signupForm" onsubmit="handleSignup(event)" novalidate>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-floating-group">
                                        <div class="input-icon-wrapper">
                                            <i class="fas fa-user"></i>
                                            <input type="text" class="form-control auth-input" id="name" placeholder="Full Name" required>
                                        </div>
                                        <div class="invalid-feedback" id="nameError"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating-group">
                                        <div class="input-icon-wrapper">
                                            <i class="fas fa-envelope"></i>
                                            <input type="email" class="form-control auth-input" id="email" placeholder="Email Address" required>
                                        </div>
                                        <div class="invalid-feedback" id="emailError"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="form-floating-group">
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" class="form-control auth-input" id="phone" placeholder="Phone Number" required>
                                </div>
                                <div class="invalid-feedback" id="phoneError"></div>
                            </div>

                            <div class="form-floating-group">
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <input type="text" class="form-control auth-input" id="address" placeholder="Shipping Address" required>
                                </div>
                                <div class="invalid-feedback" id="addressError"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-floating-group">
                                        <div class="input-icon-wrapper">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" class="form-control auth-input" id="password" placeholder="Password" required>
                                            <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="password-strength" id="passwordStrength">
                                            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                                            <span class="strength-text" id="strengthText"></span>
                                        </div>
                                        <div class="invalid-feedback" id="passwordError"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating-group">
                                        <div class="input-icon-wrapper">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" class="form-control auth-input" id="confirmPassword" placeholder="Confirm Password" required>
                                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="invalid-feedback" id="confirmPasswordError"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    I agree to the <a href="#" class="auth-link">Terms & Conditions</a> and <a href="#" class="auth-link">Privacy Policy</a>
                                </label>
                            </div>

                            <button type="submit" class="btn auth-btn w-100" id="signupBtn">
                                <span class="btn-text">Create Account</span>
                                <span class="btn-loader" style="display:none;">
                                    <i class="fas fa-spinner fa-spin"></i> Creating...
                                </span>
                            </button>
                        </form>

                        <div class="auth-divider">
                            <span>or</span>
                        </div>

                        <div class="auth-footer">
                            <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Glowsn. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });

        function checkPasswordStrength(password) {
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;

            const levels = [
                { width: '0%', color: '#e74c3c', label: '' },
                { width: '20%', color: '#e74c3c', label: 'Very Weak' },
                { width: '40%', color: '#e67e22', label: 'Weak' },
                { width: '60%', color: '#f1c40f', label: 'Fair' },
                { width: '80%', color: '#2ecc71', label: 'Strong' },
                { width: '100%', color: '#27ae60', label: 'Very Strong' }
            ];

            const level = levels[strength];
            fill.style.width = level.width;
            fill.style.background = level.color;
            text.textContent = level.label;
            text.style.color = level.color;
        }
    </script>
</body>
</html>
